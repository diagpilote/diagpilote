services:
  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy

  scheduler:
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    command: >-
      bash -lc "cd /app &&
                  alembic upgrade head &&
                  exec gunicorn -w 2 -k gthread -b 0.0.0.0:8000 app.app:app"
    environment:
      - JOB_ENQUEUE_TOKEN=${JOB_ENQUEUE_TOKEN}
      - IDEMPOTENCY_TTL=${IDEMPOTENCY_TTL}
      - API_KEY=${API_KEY}
